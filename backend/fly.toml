app = 'gitserv'
primary_region = 'ams'

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = 'gitserv_data'
  destination = '/data'

[env]
  DATA_DIR = '/data'
  LISTEN_ADDR = ':8080'
  # Set these via `fly secrets set`:
  # FRONTEND_URL = 'https://gitserv.vercel.app'
  # JWT_SECRET = 'your-secret-here'
  # GITHUB_CLIENT_ID = '...'
  # GITHUB_CLIENT_SECRET = '...'
  # GOOGLE_CLIENT_ID = '...'
  # GOOGLE_CLIENT_SECRET = '...'
  # BACKEND_URL = 'https://gitserv.fly.dev'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
